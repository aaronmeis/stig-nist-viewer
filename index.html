<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STIG · NIST Viewer — Learning Resource</title>
  <meta name="description" content="Learning resource: navigate NIST SP 800-53 Rev 5, DISA STIGs, Zero Trust, and RMF themes for a classified AI lab scenario. Educational only — not official guidance." />
  <style>
    :root {
      --bg: #0b1220;
      --bg-elev: #111a2e;
      --bg-card: #151f35;
      --bg-hover: #1a2740;
      --border: #243049;
      --border-strong: #334566;
      --text: #e8eef9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #38bdf8;
      --accent-dim: rgba(56, 189, 248, 0.12);
      --accent-2: #a78bfa;
      --ok: #34d399;
      --warn: #fbbf24;
      --high: #f97316;
      --crit: #f43f5e;
      --cat: #22d3ee;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      --sidebar-w: 280px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      --mono: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow: hidden;
    }

    /* Layout */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      background: linear-gradient(180deg, #0f172a 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      z-index: 20;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 200px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .brand-mark {
      width: 32px; height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      display: grid; place-items: center;
      font-size: 14px; font-weight: 800;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.35);
    }
    .brand span { color: var(--text-muted); font-weight: 500; font-size: 13px; margin-left: 4px; }

    .search-wrap {
      flex: 1;
      max-width: 560px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 9px 16px 9px 40px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .search-wrap::before {
      content: "⌕";
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 16px;
    }
    .top-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .pill .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 8px var(--ok);
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-elev);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 10px 24px;
    }
    .nav-section {
      margin-bottom: 18px;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 6px 10px 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      padding: 9px 12px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13.5px;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text); }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 600;
    }
    .nav-item .ico { width: 18px; text-align: center; opacity: 0.85; }
    .nav-item .count {
      margin-left: auto;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-dim);
      background: var(--bg);
      padding: 1px 7px;
      border-radius: 999px;
    }
    .nav-item.active .count { color: var(--accent); background: rgba(56,189,248,0.15); }

    /* Main */
    .main {
      overflow-y: auto;
      padding: 24px 28px 48px;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(56, 189, 248, 0.08), transparent),
        var(--bg);
    }
    .page-header {
      margin-bottom: 22px;
    }
    .page-header h1 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .page-header p {
      color: var(--text-muted);
      max-width: 720px;
      font-size: 14.5px;
    }
    .breadcrumb {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-family: var(--mono);
    }

    /* Filters toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
      align-items: center;
    }
    .chip {
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12.5px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
    }
    .chip:hover { border-color: var(--border-strong); color: var(--text); }
    .chip.active {
      background: var(--accent-dim);
      border-color: rgba(56, 189, 248, 0.4);
      color: var(--accent);
    }
    .toolbar .spacer { flex: 1; }
    .select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      font-size: 12.5px;
      font-family: inherit;
    }

    /* Cards grid */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }
    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .stat .n {
      font-size: 1.65rem;
      font-weight: 700;
      font-family: var(--mono);
      letter-spacing: -0.03em;
      color: var(--accent);
    }
    .stat .l { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      text-align: left;
      color: inherit;
      font-family: inherit;
      width: 100%;
    }
    .card:hover {
      border-color: rgba(56, 189, 248, 0.45);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-id {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .card h3 {
      font-size: 14.5px;
      font-weight: 600;
      line-height: 1.35;
      flex: 1;
    }
    .card p {
      font-size: 13px;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
    }
    .sev {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 5px;
    }
    .sev-cat { background: rgba(34, 211, 238, 0.15); color: var(--cat); }
    .sev-high { background: rgba(249, 115, 22, 0.15); color: var(--high); }
    .sev-med { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
    .sev-low { background: rgba(148, 163, 184, 0.15); color: var(--text-muted); }

    /* Detail panel */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 20, 0.55);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: none;
      justify-content: flex-end;
    }
    .detail-overlay.open { display: flex; }
    .detail-panel {
      width: min(520px, 100vw);
      height: 100%;
      background: var(--bg-elev);
      border-left: 1px solid var(--border);
      box-shadow: -20px 0 60px rgba(0,0,0,0.4);
      overflow-y: auto;
      padding: 24px;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(24px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .detail-close {
      float: right;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .detail-close:hover { color: var(--text); border-color: var(--border-strong); }
    .detail-panel h2 {
      font-size: 1.25rem;
      margin: 8px 0 4px;
      letter-spacing: -0.02em;
      clear: both;
    }
    .detail-panel .detail-id {
      font-family: var(--mono);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
    }
    .detail-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .detail-section h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .detail-section p, .detail-section li {
      font-size: 13.5px;
      color: var(--text-muted);
    }
    .detail-section ul {
      padding-left: 18px;
    }
    .detail-section li { margin-bottom: 6px; }
    .map-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 4px 4px 4px 0;
      padding: 6px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      font-size: 12.5px;
      cursor: pointer;
      font-family: inherit;
    }
    .map-link:hover { border-color: var(--accent); }

    /* Architecture layers */
    .layers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .layer {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 16px;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      cursor: pointer;
      transition: border-color 0.15s;
      text-align: left;
      color: inherit;
      font-family: inherit;
      width: 100%;
    }
    .layer:hover { border-color: rgba(56, 189, 248, 0.4); }
    .layer-name {
      font-weight: 700;
      font-size: 13px;
      color: var(--accent);
    }
    .layer-std {
      font-size: 13px;
      color: var(--text);
    }
    .layer-choice {
      font-size: 12.5px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .layer-arrow { color: var(--text-dim); font-size: 18px; }

    /* ZT pillars */
    .pillars {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .pillar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      color: inherit;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    .pillar::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: 0.7;
    }
    .pillar:hover { border-color: rgba(167, 139, 250, 0.5); transform: translateY(-2px); }
    .pillar .num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent-2);
      font-weight: 700;
    }
    .pillar h3 { font-size: 14px; margin: 6px 0 8px; }
    .pillar p { font-size: 12.5px; color: var(--text-muted); }

    /* Crosswalk table */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 12px 14px;
      background: var(--bg-elev);
      color: var(--text-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-hover); color: var(--text); }
    td strong { color: var(--text); font-weight: 600; }
    .mono { font-family: var(--mono); font-size: 12px; color: var(--accent); }

    /* Family list */
    .family-list { display: flex; flex-direction: column; gap: 8px; }
    .family-row {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 14px;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      cursor: pointer;
      text-align: left;
      color: inherit;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.12s;
    }
    .family-row:hover { border-color: rgba(56, 189, 248, 0.4); }
    .family-code {
      font-family: var(--mono);
      font-weight: 800;
      font-size: 15px;
      color: var(--accent);
    }
    .family-name { font-weight: 600; font-size: 14px; }
    .family-desc { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
    .family-count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 999px;
    }

    /* Checklist / assessor */
    .checklist {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .check-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .check-item input[type="checkbox"] {
      margin-top: 3px;
      width: 16px; height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .check-item.done { opacity: 0.55; }
    .check-item.done .check-title { text-decoration: line-through; }
    .check-title { font-weight: 600; font-size: 13.5px; }
    .check-body { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }

    /* Empty / toast */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
    }
    .hint {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--accent-dim);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text-muted);
    }
    .hint strong { color: var(--accent); }

    .rmf-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .rmf-step {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      position: relative;
    }
    .rmf-step .n {
      width: 28px; height: 28px;
      margin: 0 auto 8px;
      border-radius: 50%;
      background: var(--accent-dim);
      color: var(--accent);
      display: grid; place-items: center;
      font-weight: 700;
      font-size: 13px;
      font-family: var(--mono);
    }
    .rmf-step h4 { font-size: 12.5px; font-weight: 600; }
    .rmf-step p { font-size: 11.5px; color: var(--text-dim); margin-top: 4px; }

    .source-bar {
      margin-top: 28px;
      padding: 14px 16px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-dim);
    }
    .source-bar a { color: var(--accent); text-decoration: none; }
    .source-bar a:hover { text-decoration: underline; }

    /* Diagrams */
    .diagram-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .diagram-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: zoom-in;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      text-align: left;
      color: inherit;
      font-family: inherit;
      width: 100%;
      padding: 0;
    }
    .diagram-card:hover {
      border-color: rgba(56, 189, 248, 0.45);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .diagram-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .diagram-card.full {
      grid-column: 1 / -1;
    }
    .diagram-card header {
      padding: 14px 16px 0;
      pointer-events: none;
    }
    .diagram-card header h3 {
      font-size: 14.5px;
      font-weight: 650;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .diagram-card header h3 .zoom-hint {
      margin-left: auto;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      font-family: var(--mono);
      opacity: 0.85;
    }
    .diagram-card:hover header h3 .zoom-hint { color: var(--accent); }
    .diagram-card header p {
      font-size: 12.5px;
      color: var(--text-muted);
      margin-top: 4px;
      margin-bottom: 8px;
    }
    .diagram-body {
      padding: 8px 12px 14px;
      overflow-x: auto;
      pointer-events: none;
    }
    .diagram-body svg {
      display: block;
      width: 100%;
      height: auto;
      min-width: 280px;
      max-width: 920px;
      margin: 0 auto;
    }
    .diagram-caption {
      font-size: 11.5px;
      color: var(--text-dim);
      padding: 0 16px 14px;
      border-top: 1px solid var(--border);
      margin-top: auto;
      padding-top: 10px;
      pointer-events: none;
    }
    .diagram-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      padding: 0 16px 12px;
      font-size: 11.5px;
      color: var(--text-muted);
    }
    .diagram-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .diagram-legend i {
      width: 10px; height: 10px;
      border-radius: 3px;
      display: inline-block;
    }
    .diagram-inline {
      margin: 0 0 20px;
    }
    .diagram-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .diagram-tabs .chip.active {
      background: var(--accent-dim);
      border-color: rgba(56, 189, 248, 0.4);
      color: var(--accent);
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: rgba(3, 8, 18, 0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

      border-radius: 16px;

      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: lbIn 0.18s ease;
    }
    @keyframes lbIn {
      from { opacity: 0; transform: scale(0.97) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }

    .lightbox-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;

      letter-spacing: -0.02em;
      flex: 1;
    }
    .lightbox-top p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .lightbox-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .lightbox-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: grid;
      place-items: center;
      font-family: inherit;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .lightbox-btn:hover {
      color: var(--text);
      border-color: var(--border-strong);
      background: var(--bg-hover);
    }
    .lightbox-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .lightbox-stage {
      flex: 1;
      overflow: auto;
      padding: 20px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(56, 189, 248, 0.06), transparent),
        var(--bg);
    }
    .lightbox-stage svg {
      width: 100%;
      height: auto;
      max-height: min(68vh, 620px);
      display: block;
    }
    .lightbox-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;

      min-width: 180px;
      font-size: 12.5px;
      color: var(--text-muted);
    }
    .lightbox-footer .nav-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }
    .lightbox-nav {

      gap: 8px;
    }

      background: var(--bg-card);
      color: var(--text-muted);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 12.5px;
      cursor: pointer;
      font-family: inherit;

      border-color: rgba(56, 189, 248, 0.4);

    .lightbox-hint {
      width: 100%;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);

    /* Playbook / builder */
    .phase {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
      border-left: 3px solid var(--accent);
    }
    .phase-head {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .phase-n {

      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-dim);

      border-radius: 6px;

    .phase-weeks {

      color: var(--text-dim);
      font-family: var(--mono);
    }
    .phase-goal {
      font-size: 13.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .phase-cols {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }
    .phase-cols h4 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .phase-cols ul {
      padding-left: 16px;
      font-size: 12.5px;
      color: var(--text-muted);
    }
    .phase-cols li { margin-bottom: 4px; }
    .phase-cols .avoid li { color: #fda4af; }
    .phase-cols .out li { color: #6ee7b7; }

    .principle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .principle {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .principle h3 { font-size: 13.5px; margin-bottom: 6px; color: var(--accent); }
    .principle p { font-size: 12.5px; color: var(--text-muted); }

    .pitfall {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
    }
    .pitfall h3 { font-size: 13.5px; margin-bottom: 4px; }
    .pitfall p { font-size: 12.5px; color: var(--text-muted); }
    .pitfall .fix-label {
      font-size: 11.5px;
      color: var(--ok);
      margin-top: 6px;
    }

    .glossary-item {
      display: grid;
      grid-template-columns: minmax(120px, 180px) 1fr;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .glossary-item:last-child { border-bottom: none; }
    .glossary-item dt {
      font-family: var(--mono);
      font-size: 12.5px;
      font-weight: 700;
      color: var(--accent);
    }
    .glossary-item dd {
      font-size: 13px;
      color: var(--text-muted);
    }
    @media (max-width: 600px) {
      .glossary-item { grid-template-columns: 1fr; gap: 4px; }
    }

    .read-card {
      display: block;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.12s;
    }
    .read-card:hover { border-color: rgba(56, 189, 248, 0.45); }
    .read-card .org {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--accent-2);
      margin-bottom: 4px;
    }
    .read-card h3 { font-size: 14px; margin-bottom: 6px; color: var(--accent); }
    .read-card p { font-size: 12.5px; color: var(--text-muted); }

    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 56px auto 1fr; }
      .sidebar {
        display: flex;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px;
        gap: 4px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .nav-section { display: flex; gap: 4px; margin: 0; align-items: center; }
      .nav-label { display: none; }
      .nav-item { white-space: nowrap; }
      .nav-item .count { display: none; }
      .layer { grid-template-columns: 1fr; }
      .main { padding: 16px; }
      .top-meta .pill:not(:first-child) { display: none; }
    }

</head>

      { t: "Evidence continuously", d: "cATO assumes dashboards and automated scans — not a binder assembled once a year." },

  }

  function renderDiagramStrip(ids) {
    return `<div class="diagram-grid diagram-inline">${ids.map(id => {
      const d = getDiagram(id);
      return d ? diagramCard(d, { full: ids.length === 1 }) : "";
    }).join("")}</div>`;
  }

  /* Lightbox state */
  let lightboxIds = [];
  let lightboxIndex = 0;

  function openLightbox(id, ids) {
    const list = (ids && ids.length) ? ids : DIAGRAMS.map(d => d.id);
    const idx = list.indexOf(id);
    if (idx < 0) return;
    lightboxIds = list;
    lightboxIndex = idx;
    closeDetail();
    renderLightbox();
    const lb = $("#lightbox");
    lb.hidden = false;
    lb.classList.add("open");
    document.body.style.overflow = "hidden";
    $("#lb-close")?.focus();
  }

  function closeLightbox() {
    const lb = $("#lightbox");
    if (!lb) return;
    lb.classList.remove("open");
    lb.hidden = true;
    document.body.style.overflow = "";
  }

  function lightboxStep(delta) {
    if (!lightboxIds.length) return;
    lightboxIndex = (lightboxIndex + delta + lightboxIds.length) % lightboxIds.length;
    renderLightbox();
  }

  function renderLightbox() {
    const id = lightboxIds[lightboxIndex];
    const d = getDiagram(id);
    if (!d) return;
    $("#lightbox-title").textContent = d.title;
    $("#lightbox-blurb").textContent = d.blurb;
    $("#lightbox-caption").textContent = d.caption;
    $("#lightbox-index").textContent = `${lightboxIndex + 1} / ${lightboxIds.length}`;
    $("#lightbox-stage").innerHTML = d.svg();
    const atStart = lightboxIds.length <= 1;
    ["lb-prev", "lb-prev2", "lb-next", "lb-next2"].forEach(bid => {
      const el = $("#" + bid);
      if (el) el.disabled = atStart;
    });
  }

  function wireLightboxTriggers(root) {
    const scope = root || document;
    const idsOnPage = [...scope.querySelectorAll("[data-lightbox]")].map(el => el.dataset.lightbox);
    scope.querySelectorAll("[data-lightbox]").forEach(el => {
      el.addEventListener("click", (e) => {
        e.preventDefault();
        openLightbox(el.dataset.lightbox, idsOnPage.length ? idsOnPage : null);
      });
    });
  }

  window.openLightbox = openLightbox;
  window.closeLightbox = closeLightbox;

  function matchQ(obj, fields) {
    if (!state.q) return true;
    const q = state.q.toLowerCase();
    return fields.some(f => String(obj[f] ?? "").toLowerCase().includes(q))
      || (obj.families && obj.families.some(x => x.toLowerCase().includes(q)))
      || (obj.stigs && obj.stigs.some(x => x.toLowerCase().includes(q)))
      || (obj.focus && obj.focus.some(x => x.toLowerCase().includes(q)))
      || (obj.lab && (Array.isArray(obj.lab) ? obj.lab : [obj.lab]).some(x => x.toLowerCase().includes(q)));
  }

  function filteredControls() {
    return DATA.controls.filter(c => {
      if (state.family && c.family !== state.family) return false;
      if (state.stig && !(c.stigs || []).includes(state.stig)) return false;
      if (state.pillar && !(c.zt || []).includes(state.pillar)) return false;
      if (state.layer && !(c.layers || []).includes(state.layer)) return false;
      if (state.severity !== "all" && c.severity !== state.severity) return false;
      if (!matchQ(c, ["id", "title", "summary", "lab", "check", "family"])) return false;
      return true;
    });
  }

  function renderSidebar() {
    const sections = {};
    VIEWS.forEach(v => {
      (sections[v.section] ||= []).push(v);
    });
    let html = "";
    for (const [sec, items] of Object.entries(sections)) {
      html += `<div class="nav-section"><div class="nav-label">${esc(sec)}</div>`;
      items.forEach(v => {
        let count = "";
        if (v.id === "controls") count = DATA.controls.length;
        if (v.id === "families") count = DATA.families.length;
        if (v.id === "stigs") count = DATA.stigs.length;
        if (v.id === "zt") count = DATA.pillars.length;
        if (v.id === "layers") count = DATA.layers.length;
        if (v.id === "assessor") count = DATA.assessor.length;
        if (v.id === "diagrams") count = DIAGRAMS.length;
        if (v.id === "playbook") count = DATA.phases.length;
        if (v.id === "glossary") count = DATA.glossary.length;
        if (v.id === "pitfalls") count = DATA.pitfalls.length;
        if (v.id === "reading") count = DATA.reading.length;
        html += `<button class="nav-item ${state.view === v.id ? "active" : ""}" data-view="${v.id}">
          <span class="ico">${v.ico}</span>${esc(v.label)}
          ${count !== "" ? `<span class="count">${count}</span>` : ""}
        </button>`;
      });
      html += `</div>`;
    }
    $("#sidebar").innerHTML = html;
    $("#sidebar").querySelectorAll("[data-view]").forEach(btn => {
      btn.addEventListener("click", () => {
        state.view = btn.dataset.view;
        if (state.view !== "controls") {
          state.family = state.stig = state.pillar = state.layer = null;
        }
        render();
      });
    });
  }

      <div class="pillars">
        ${DATA.pillars.filter(p => matchQ(p, ["name","summary","lab"])).map(p => `
          <button class="pillar" data-pillar="${p.id}">
            <div class="num">PILLAR ${esc(p.num)}</div>
            <h3>${esc(p.name)}</h3>
            <p>${esc(p.summary)}</p>
          </button>
        `).join("")}
      </div>
    `;
  }

  function renderCrosswalk() {
    const rows = DATA.crosswalk.filter(r =>
      !state.q || Object.values(r).some(v => String(v).toLowerCase().includes(state.q.toLowerCase()))
    );
    return `
      <div class="page-header">
        <div class="breadcrumb">MAP</div>
        <h1>Mission need → NIST → STIG → ZT</h1>
        <p>Crosswalk of scenario compliance themes for study, self-briefing, and literacy exercises.</p>
      </div>
      ${renderDiagramStrip(["mapflow"])}
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Mission / need</th><th>NIST controls</th><th>STIG / mechanism</th><th>Zero Trust</th></tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td><strong>${esc(r.need)}</strong></td>
                <td class="mono">${esc(r.nist)}</td>
                <td>${esc(r.stig)}</td>
                <td>${esc(r.zt)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderRMF() {
    return `
      <div class="page-header">
        <div class="breadcrumb">RMF · CATO</div>
        <h1>Risk Management Framework path</h1>
        <p>NIST RMF steps applied to the lab. Mature guidance pushes toward <strong style="color:var(--text)">continuous ATO (cATO)</strong> — automated derivation, testing, and monitoring in DevSecOps rather than periodic manual reassessments only.</p>
      </div>
      ${renderDiagramStrip(["rmf"])}
      <div class="rmf-steps">
        ${DATA.rmf.map(s => `
          <div class="rmf-step">
            <div class="n">${s.n}</div>
            <h4>${esc(s.name)}</h4>
            <p>${esc(s.desc)}</p>
          </div>
        `).join("")}
      </div>
      <div class="grid">
        <div class="card" style="cursor:default">
          <div class="card-top"><h3>Authorization boundaries</h3></div>
          <p>Scope RMF around discrete functions (training, inference, ingress) rather than a single monolithic “AI lab” boundary — cleaner risk decisions and STIGs.</p>
        </div>
        <div class="card" style="cursor:default">
          <div class="card-top"><h3>Policy-as-code</h3></div>
          <p>Encode STIG/RMF controls in IaC and admission controllers so on-prem vs IL5/IL6 placement is a placement decision, not a re-architecture.</p>
        </div>
        <div class="card" style="cursor:default">
          <div class="card-top"><h3>Evidence for AO</h3></div>
          <p>STIG scan exports, SBOM inventories, diode transfer logs, and continuous monitoring dashboards form the cATO evidence spine.</p>
        </div>
        <div class="card" style="cursor:default">
          <div class="card-top"><h3>Parallel: CMMC</h3></div>
          <p>Organizations handling CUI alongside classified data often study a parallel CMMC track (NIST 800-171 / 800-53 derivatives) as part of broader compliance literacy.</p>
        </div>
      </div>
    `;
  }

  function renderAssessor() {
    const checks = loadChecks();
    const done = DATA.assessor.filter(a => checks[a.id]).length;
    return `
      <div class="page-header">
        <div class="breadcrumb">STUDY CHECKLIST</div>
        <h1>What an assessor often looks for</h1>
        <p>Educational checklist of common evidence themes. Not a formal assessment package. Check items as you study — progress is stored in this browser only (${done}/${DATA.assessor.length} done).</p>
      </div>
      <div class="stats" style="grid-template-columns:repeat(3,1fr);max-width:480px">
        <div class="stat"><div class="n">${done}</div><div class="l">Complete</div></div>
        <div class="stat"><div class="n">${DATA.assessor.length - done}</div><div class="l">Remaining</div></div>
        <div class="stat"><div class="n">${Math.round(100 * done / DATA.assessor.length)}%</div><div class="l">Progress</div></div>
      </div>
      <div class="checklist">
        ${DATA.assessor.map(a => `
          <label class="check-item ${checks[a.id] ? "done" : ""}">
            <input type="checkbox" data-check="${a.id}" ${checks[a.id] ? "checked" : ""} />
            <div>
              <div class="check-title">${esc(a.title)}</div>
              <div class="check-body">${esc(a.body)}</div>
            </div>
          </label>
        `).join("")}
      </div>
    `;
  }

  function renderSearchResults() {
    if (!state.q) return null;
    const q = state.q.toLowerCase();
    const controls = DATA.controls.filter(c => matchQ(c, ["id","title","summary","lab","check","family"]));
    const stigs = DATA.stigs.filter(s => matchQ(s, ["name","summary","products"]));
    const families = DATA.families.filter(f => matchQ(f, ["id","name","desc"]));
    if (state.view !== "home" && state.view !== "controls") return null;
    // only hijack main content when on home with query
    if (state.view !== "home") return null;
    return `
      <div class="page-header">
        <div class="breadcrumb">SEARCH</div>
        <h1>Results for “${esc(state.q)}”</h1>
        <p>${controls.length} controls · ${families.length} families · ${stigs.length} STIG stacks</p>
      </div>
      ${controls.length ? `<h2 style="font-size:14px;margin:16px 0 10px;color:var(--text-muted)">Controls</h2><div class="grid">${controls.map(controlCard).join("")}</div>` : ""}
      ${families.length ? `<h2 style="font-size:14px;margin:20px 0 10px;color:var(--text-muted)">Families</h2><div class="family-list">${families.map(f => `
        <button class="family-row" data-fam="${f.id}">
          <div class="family-code">${esc(f.id)}</div>
          <div><div class="family-name">${esc(f.name)}</div><div class="family-desc">${esc(f.desc)}</div></div>
          <div class="family-count">Open</div>
        </button>`).join("")}</div>` : ""}
      ${stigs.length ? `<h2 style="font-size:14px;margin:20px 0 10px;color:var(--text-muted)">STIGs</h2><div class="grid">${stigs.map(s => `
        <button class="card" data-stig="${s.id}"><div class="card-top"><h3>${esc(s.name)}</h3></div><p>${esc(s.summary)}</p></button>
      `).join("")}</div>` : ""}
      ${!controls.length && !families.length && !stigs.length ? `<div class="empty">No matches. Try AC-4, diode, Kubernetes, SBOM, cATO…</div>` : ""}
    `;
  }

  function render() {
    renderSidebar();
    let html = "";
    if (state.view === "home" && state.q) {
      html = renderSearchResults();
    } else {
      const map = {
        home: renderHome,
        playbook: renderPlaybook,
        diagrams: renderDiagrams,
        layers: renderLayers,
        families: renderFamilies,
        controls: renderControls,
        stigs: renderStigs,
        zt: renderZT,
        crosswalk: renderCrosswalk,
        rmf: renderRMF,
        assessor: renderAssessor,
        pitfalls: renderPitfalls,
        glossary: renderGlossary,
        reading: renderReading,
      };
      html = (map[state.view] || renderHome)();
    }
    $("#main").innerHTML = html;
    $("#resultCount").textContent =
      state.view === "controls" ? `${filteredControls().length} controls` :
      state.view === "diagrams" ? `${DIAGRAMS.length} diagrams` :
      state.q ? `q: ${state.q}` : DATA.meta.baseline.split("·")[0].trim();

    // wire interactions
    wireLightboxTriggers($("#main"));
    $("#main").querySelectorAll("[data-ctrl]").forEach(el => {
      el.addEventListener("click", () => {
        const c = DATA.controls.find(x => x.id === el.dataset.ctrl);
        if (c) controlDetail(c);
      });
    });
    $("#main").querySelectorAll("[data-view]").forEach(el => {
      el.addEventListener("click", () => { state.view = el.dataset.view; render(); });
    });
    $("#main").querySelectorAll("[data-fam]").forEach(el => {
      el.addEventListener("click", () => window.gotoFamily(el.dataset.fam));
    });
    $("#main").querySelectorAll("[data-stig]").forEach(el => {
      el.addEventListener("click", () => {
        const s = DATA.stigs.find(x => x.id === el.dataset.stig);
        if (state.view === "stigs" && s) stigDetail(s);
        else window.gotoStig(el.dataset.stig);
      });
    });
    $("#main").querySelectorAll("[data-pillar]").forEach(el => {
      el.addEventListener("click", () => {
        const p = DATA.pillars.find(x => x.id === el.dataset.pillar);
        if (p) pillarDetail(p);
      });
    });
    $("#main").querySelectorAll("[data-layer]").forEach(el => {
      el.addEventListener("click", () => {
        const l = DATA.layers.find(x => x.id === el.dataset.layer);
        if (l) layerDetail(l);
      });
    });
    $("#main").querySelectorAll("[data-focus]").forEach(el => {
      el.addEventListener("click", () => { state.labFocus = el.dataset.focus; render(); });
    });
    $("#main").querySelectorAll("[data-check]").forEach(el => {
      el.addEventListener("change", () => {
        const map = loadChecks();
        map[el.dataset.check] = el.checked;
        saveChecks(map);
        render();
      });
    });
    if (state.view === "controls") wireControlToolbar();
  }

  /* =========================================================================
     BOOT
     ========================================================================= */
  $("#search").addEventListener("input", (e) => {
    state.q = e.target.value.trim();
    if (state.q && state.view !== "controls" && state.view !== "home") {
      // keep view but filters apply where relevant
    }
    if (state.q && (state.view === "home" || !state.view)) state.view = "home";
    render();
  });

  $("#overlay").addEventListener("click", (e) => {
    if (e.target === $("#overlay")) closeDetail();
  });

  // Lightbox controls
  const lb = $("#lightbox");
  lb.addEventListener("click", (e) => {
    if (e.target === lb) closeLightbox();
  });
  $("#lb-close").addEventListener("click", closeLightbox);
  $("#lb-prev").addEventListener("click", () => lightboxStep(-1));
  $("#lb-next").addEventListener("click", () => lightboxStep(1));
  $("#lb-prev2").addEventListener("click", () => lightboxStep(-1));
  $("#lb-next2").addEventListener("click", () => lightboxStep(1));

  document.addEventListener("keydown", (e) => {
    const lbOpen = $("#lightbox")?.classList.contains("open");
    if (e.key === "Escape") {
      if (lbOpen) { closeLightbox(); return; }
      closeDetail();
      return;
    }
    if (lbOpen) {
      if (e.key === "ArrowLeft") { e.preventDefault(); lightboxStep(-1); return; }
      if (e.key === "ArrowRight") { e.preventDefault(); lightboxStep(1); return; }
    }
    if (e.key === "/" && document.activeElement !== $("#search") && !lbOpen) {
      e.preventDefault();
      $("#search").focus();
    }
  });

  render();
  </script>
</body>
</html>
